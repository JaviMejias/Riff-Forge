server {
    listen 8080;
    server_name localhost;

    # Add correct MIME types for module scripts (vite creates .mjs workers)
    include /etc/nginx/mime.types;
    types {
        application/javascript mjs;
    }

    # Allow large file uploads (e.g. 5-20MB MP3 files)
    client_max_body_size 100M;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression for faster loading
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json;
    gzip_disable "MSIE [1-6]\.";

    # Hashed assets (JS, CSS, images) — safe to cache for 1 year
    # MUST come before the catch-all "/" location so nginx serves them directly
    # and does NOT fall back to index.html when a file is missing (404 instead).
    location ^~ /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable, no-transform";
        try_files $uri =404;
    }

    # AlphaTab static files — must NOT fall back to index.html
    location ^~ /alphatab/ {
        expires 1d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # index.html — NEVER cache so the browser always fetches the latest version
    # This ensures new asset hashes are picked up after every deploy.
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
    }

    # Reverse proxy para el Backend
    location /api/ {
        proxy_pass http://backend:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /uploads/ {
        proxy_pass http://backend:3001/uploads/;
        proxy_set_header Host $host;
    }

    location /downloads/ {
        proxy_pass http://backend:3001/downloads/;
        proxy_set_header Host $host;
    }

    # Single Page Application routing (everything else falls back to index.html)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
