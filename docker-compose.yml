version: '3.8'

services:
  backend:
    build: 
      context: ../riff-forge-api
    container_name: riff_backend
    restart: always
    ports:
      - "3001:3001"
    env_file:
      - .env.backend      # ← secretos fuera del git (ver instrucciones abajo)
    environment:
      - PORT=3001
    volumes:
      # Guardar la base de datos de forma permanente
      - backend_data:/app/data
      # Guardar los audios subidos de forma permanente
      - uploads_data:/app/uploads

  frontend:
    build:
      context: .
    container_name: riff_frontend
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - backend

volumes:
  backend_data:
  uploads_data:
